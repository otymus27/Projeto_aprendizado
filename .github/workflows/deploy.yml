name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código do GitHub
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar Processamento HTML (extract.js)
        run: node extract.js

      - name: Copiar arquivos para a VPS via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: "."
          target: "${{ secrets.VPS_TARGET_DIR }}"

      - name: Reiniciar aplicação na VPS via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # HOME pode estar vazio em shells não-interativos — ler do /etc/passwd
            export HOME=$(getent passwd $(whoami) | cut -d: -f6)

            # Carregar NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Validar se node foi carregado
            node --version || { echo "ERRO: node não encontrado após NVM load"; exit 1; }

            # Navegar até o projeto
            cd ${{ secrets.VPS_TARGET_DIR }}

            # Reiniciar ou iniciar a aplicação
            if pm2 describe "projeto-aprendizado" > /dev/null 2>&1; then
              pm2 restart "projeto-aprendizado" --update-env
            else
              PORT=3000 pm2 start server.js --name "projeto-aprendizado"
            fi
            pm2 save
